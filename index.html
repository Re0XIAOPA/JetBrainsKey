<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JetBrainsKey</title>

    <!-- 预加载脚本，防止暗黑模式闪烁 -->
    <!-- <script src="/assets/js/components/theme-preloader.js"></script> -->
    <script>
        // 内联预加载脚本，确保优先执行
        const savedTheme = localStorage.getItem('theme') || 'auto';
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

        function applyTheme() {
            if (savedTheme === 'dark' || (savedTheme === 'auto' && prefersDark)) {
                document.documentElement.classList.add('dark-theme');
            } else if (savedTheme === 'light' || (savedTheme === 'auto' && !prefersDark)) {
                document.documentElement.classList.remove('dark-theme');
            }
        }

        applyTheme();

        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                if (savedTheme === 'auto') {
                    applyTheme();
                }
            });
        }
    </script>

    <!-- 网站图标 -->
    <link rel="icon" type="image/svg+xml" href="/assets/images/icons/jetbrains-academy.svg" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/icons/jetbrains-academy.svg" sizes="64x64" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/icons/jetbrains-academy.svg" sizes="128x128" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/icons/jetbrains-academy.svg" sizes="256x256" />
    <link rel="shortcut icon" href="/assets/images/icons/jetbrains-academy.svg" />
    <link rel="apple-touch-icon" sizes="128x128" href="/assets/images/icons/jetbrains-academy.svg" />

    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/responsive.css">
    <link rel="stylesheet" href="/assets/css/all.min.css">
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->
</head>

<body>

        <div class="navbar-content">

                <div class="logo">
                    <img src="/assets/images/icons/jetbrains-academy.svg" alt="Logo" class="logo-image">
                    <span class="logo-text">JetBrainsKey</span>

            </div>
            
            <div class="category-tabs">

                <!-- 添加更多分类 -->
            </div>

                <div class="search-container">
                    <div class="search-button">

            </div>
        </div>
    </header>

    <!-- 卡片容器 -->
    <main class="card-container" id="card-container">
        <!-- 卡片将通过JS动态生成 -->
    </main>

    <!-- 右下角控制按钮 -->

        <button id="language-toggle" title="切换语言">
            <i class="fas fa-language"></i>
        </button>
        <button id="theme-toggle" title="切换主题">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <!-- 底部下载提示 -->

    </div>

    <!-- 页脚免责声明 -->

        </div>

    <!-- 引入脚本 -->
    <script type="module" src="/assets/js/main.js"></script>
</body>
